name: Send Daily Brief Email

on:
  push:
    branches:
      - claude/publish
    paths:
      - "issues/**.html"

permissions:
  contents: write # lets the workflow commit the generated hero back

jobs:
  send-email:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate hero image
        id: hero
        env:
          FAL_KEY: ${{ secrets.FAL_KEY }}
        run: |
          set -e
          # Derive the date from the newest issue filename (issues/YYYY-MM-DD.html)
          # rather than the clock, so the hero always matches the issue being sent.
          LATEST_ISSUE=$(git ls-files 'issues/*.html' | sort -V | tail -n 1)
          if [ -z "$LATEST_ISSUE" ]; then
            echo "generated=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          TODAY=$(basename "$LATEST_ISSUE" .html)
          HERO="assets/${TODAY}-hero.png"

          # No prompt file = routine chose to skip the hero today. Not an error.
          if [ ! -f assets/hero-prompt.txt ]; then
            echo "generated=false" >> "$GITHUB_OUTPUT"; exit 0
          fi

          PROMPT=$(cat assets/hero-prompt.txt)

          # Call FLUX schnell (synchronous — response contains the image URL)
          RESPONSE=$(curl -sf --max-time 90 https://fal.run/fal-ai/flux/schnell \
            -H "Authorization: Key $FAL_KEY" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg p "$PROMPT" \
                 '{prompt:$p, image_size:{width:1200,height:675}, num_images:1}')" \
            ) || { echo "generated=false" >> "$GITHUB_OUTPUT"; exit 0; }

          URL=$(echo "$RESPONSE" | jq -r '.images[0].url // empty')
          if [ -z "$URL" ]; then
            echo "generated=false" >> "$GITHUB_OUTPUT"; exit 0
          fi

          curl -sf --max-time 60 -o "$HERO" "$URL" \
            || { echo "generated=false" >> "$GITHUB_OUTPUT"; exit 0; }

          # Commit the hero so the raw.githubusercontent URL in the email resolves
          git config user.name  "willy-brief-bot"
          git config user.email "actions@github.com"
          git add "$HERO"
          git commit -m "Add hero image for ${TODAY}"
          git push origin "HEAD:$GITHUB_REF_NAME"
          echo "generated=true" >> "$GITHUB_OUTPUT"

      - name: Strip img tags for missing assets
        id: strip
        run: |
          set -e
          ISSUE=$(git ls-files 'issues/*.html' | sort -V | tail -n 1)
          [ -n "$ISSUE" ] && [ -f "$ISSUE" ] || exit 0

          # Scan the issue for every asset referenced via a raw.githubusercontent
          # URL on claude/publish and strip any <img> tag whose path is missing
          # from the git tree, so the email never ships a broken image. HEAD
          # includes the hero commit from the previous step when it succeeded.
          PREFIX="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/claude/publish/"
          STRIPPED=""
          for path in $(grep -oE "${PREFIX}[^\"'<> )]+" "$ISSUE" | sed "s|^${PREFIX}||" | sort -u); do
            if ! git cat-file -e "HEAD:${path}" 2>/dev/null; then
              echo "Missing asset: ${path} — stripping tag(s):"
              awk -v p="$path" 'index($0, p) && tolower($0) ~ /<img/' "$ISSUE"
              awk -v p="$path" '!(index($0, p) && tolower($0) ~ /<img/)' "$ISSUE" > "${ISSUE}.tmp"
              mv "${ISSUE}.tmp" "$ISSUE"
              STRIPPED="${STRIPPED}${path}"$'\n'
            fi
          done
          [ -n "$STRIPPED" ] || echo "All referenced assets exist; nothing stripped."

          {
            echo "stripped<<STRIPPED_EOF"
            printf '%s' "$STRIPPED"
            echo "STRIPPED_EOF"
          } >> "$GITHUB_OUTPUT"
          # Note: we edit the file in the runner's workspace only — this is
          # what gets sent. The committed site copy is untouched.

      - name: Find latest issue
        id: latest
        run: |
          latest=$(git ls-files 'issues/*.html' | sort -V | tail -n 1)
          if [ -z "$latest" ]; then
            echo "No HTML files found in issues/" >&2
            exit 1
          fi
          echo "Latest issue: $latest"
          echo "file=$latest" >> "$GITHUB_OUTPUT"
          echo "subject=Daily Willy Brief — $(basename "$latest" .html)" >> "$GITHUB_OUTPUT"

      - name: Send via Resend
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ISSUE_FILE: ${{ steps.latest.outputs.file }}
          SUBJECT: ${{ steps.latest.outputs.subject }}
        run: |
          jq -n \
            --arg from "Daily Willy Brief <onboarding@resend.dev>" \
            --arg to "williamkiongwl@gmail.com" \
            --arg subject "$SUBJECT" \
            --rawfile html "$ISSUE_FILE" \
            '{from: $from, to: [$to], subject: $subject, html: $html}' \
          | curl --fail-with-body -sS -X POST "https://api.resend.com/emails" \
              -H "Authorization: Bearer $RESEND_API_KEY" \
              -H "Content-Type: application/json" \
              --data-binary @-
